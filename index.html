<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TruthLens — Fake News Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
/* ── RESET & BASE ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a0f;--bg2:#0d1117;
  --surf:#151d28;--surf2:#1a2333;
  --b1:#1e2d3d;--b2:#253345;
  --tx:#e8edf2;--tx2:#8899aa;--tx3:#4a5a6a;
  --ac:#00d4ff;--gn:#00ff88;--rd:#ff3355;
  --or:#ff8844;--yl:#ffcc00;--pu:#a855f7;
  --fh:'Syne',sans-serif;
  --fb:'DM Sans',sans-serif;
  --fm:'DM Mono',monospace;
  /* Responsive spacing */
  --px:clamp(1rem,4vw,2rem);
  --py:clamp(2rem,5vw,4rem);
  --gap:clamp(0.6rem,2vw,1.2rem);
  --r:12px;
}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;line-height:1.6}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;line-height:inherit}
input,textarea{font-family:var(--fb);outline:none;border:none;font-size:inherit}
img,svg{max-width:100%}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
/* ── RESPONSIVE GRID UTILITY ─────────────────── */
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--gap)}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap)}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(280px,100%),1fr));gap:var(--gap)}
.grid-sidebar{display:grid;grid-template-columns:1fr 300px;gap:var(--gap)}
/* ── BREAKPOINTS ─────────────────────────────── */
@media(max-width:1024px){.grid-sidebar{grid-template-columns:1fr}}
@media(max-width:768px){
  .grid-2{grid-template-columns:1fr}
  .grid-3{grid-template-columns:1fr}
  .grid-4{grid-template-columns:repeat(2,1fr)}
  .hide-md{display:none!important}
}
@media(max-width:480px){
  .grid-4{grid-template-columns:1fr}
  .hide-sm{display:none!important}
  html{font-size:15px}
}
/* ── CONTAINER ───────────────────────────────── */
.wrap{max-width:1100px;margin:0 auto;padding:0 var(--px)}
/* ── CARD ────────────────────────────────────── */
.card{background:var(--surf);border:1px solid var(--b1);border-radius:var(--r);padding:clamp(1rem,3vw,1.6rem)}
/* ── SECTION ─────────────────────────────────── */
.section{padding:var(--py) var(--px)}
/* ── TYPOGRAPHY ──────────────────────────────── */
.h1{font-family:var(--fh);font-weight:800;font-size:clamp(2rem,5vw,3.8rem);letter-spacing:-.03em;line-height:1.05}
.h2{font-family:var(--fh);font-weight:800;font-size:clamp(1.5rem,3.5vw,2.4rem);letter-spacing:-.03em}
.h3{font-family:var(--fh);font-weight:700;font-size:clamp(1rem,2vw,1.1rem)}
.label{font-family:var(--fm);font-size:11px;letter-spacing:.15em;color:var(--tx3);text-transform:uppercase}
.mono{font-family:var(--fm)}
/* ── ANIMATIONS ──────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideIn{from{transform:translateX(-10px);opacity:0}to{transform:none;opacity:1}}
/* ── NAVBAR ──────────────────────────────────── */
#navbar{position:fixed;top:0;left:0;right:0;z-index:200;transition:background .3s,border-color .3s;border-bottom:1px solid transparent}
#navbar.scrolled{background:rgba(6,10,15,.95);backdrop-filter:blur(20px);border-bottom-color:var(--b1)}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 var(--px);display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-box{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--gn));display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:14px;color:#000;flex-shrink:0}
.logo-text{font-family:var(--fh);font-weight:700;font-size:17px;letter-spacing:-.02em;white-space:nowrap}
.nav-links{display:flex;align-items:center;gap:2px;flex-wrap:nowrap}
.nav-btn{padding:6px 12px;border-radius:8px;font-size:13px;color:var(--tx2);transition:all .2s;white-space:nowrap}
.nav-btn:hover{color:var(--tx)}
.nav-btn.active{color:var(--ac);background:rgba(0,212,255,.08);font-weight:600}
.nav-cta{padding:8px 16px;border-radius:8px;background:var(--ac);color:#000!important;font-family:var(--fh);font-weight:700;font-size:13px;margin-left:8px;white-space:nowrap}
.hamburger{display:none;flex-direction:column;gap:5px;padding:8px;flex-shrink:0}
.hamburger span{display:block;width:22px;height:2px;background:var(--tx);border-radius:2px;transition:all .3s}
.mob-menu{display:none;flex-direction:column;gap:2px;padding:.8rem var(--px) 1.2rem;background:var(--bg2);border-top:1px solid var(--b1)}
.mob-menu.open{display:flex}
.mob-btn{padding:10px 12px;border-radius:8px;font-size:14px;text-align:left;color:var(--tx2);transition:background .15s}
.mob-btn.active{color:var(--ac);background:rgba(0,212,255,.08)}
@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
}
@media(max-width:400px){
  .logo-text{font-size:15px}
}
/* ── HERO ────────────────────────────────────── */
.hero{min-height:90vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:calc(64px + 3rem) var(--px) 3rem;position:relative;overflow:hidden}
.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.04)1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04)1px,transparent 1px);background-size:40px 40px;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%)}
.hero-orb{position:absolute;top:10%;left:50%;transform:translateX(-50%);width:min(500px,90vw);height:min(500px,90vw);border-radius:50%;background:radial-gradient(circle,rgba(0,212,255,.07) 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;max-width:min(760px,100%);animation:fadeUp .8s ease}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.22);border-radius:20px;padding:5px 14px;margin-bottom:1.4rem;font-family:var(--fm);font-size:11px;color:var(--ac);letter-spacing:.1em}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;flex-shrink:0}
.hero-sub{font-size:clamp(.95rem,2vw,1.1rem);color:var(--tx2);max-width:520px;margin:0 auto 1.4rem;line-height:1.75}
.hero-ticker{height:24px;overflow:hidden;margin-bottom:2rem;font-family:var(--fm);font-size:12px;color:var(--tx3)}
.hero-input-wrap{display:flex;gap:8px;max-width:min(540px,100%);margin:0 auto;background:var(--surf);border:1px solid var(--b2);border-radius:14px;padding:7px 7px 7px 16px}
.hero-input{flex:1;background:none;color:var(--tx);font-size:13px;font-family:var(--fm);min-width:0}
.hero-input::placeholder{color:var(--tx3)}
.hero-btn{background:var(--ac);color:#000;font-family:var(--fh);font-weight:700;font-size:13px;padding:10px clamp(12px,3vw,18px);border-radius:10px;white-space:nowrap;flex-shrink:0}
/* ── STATS STRIP ─────────────────────────────── */
.stats-strip{background:var(--surf);border-top:1px solid var(--b1);border-bottom:1px solid var(--b1);padding:1.8rem var(--px)}
.stats-strip .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap);text-align:center}
@media(max-width:600px){.stats-strip .wrap{grid-template-columns:repeat(2,1fr)}}
.stat-val{font-family:var(--fh);font-weight:800;font-size:clamp(1.6rem,4vw,2.2rem);color:var(--ac);letter-spacing:-.03em}
.stat-lbl{font-size:11px;color:var(--tx3);font-family:var(--fm);letter-spacing:.06em;margin-top:4px}
/* ── FEATURES GRID ───────────────────────────── */
.feat-card{background:var(--surf);border:1px solid var(--b1);border-radius:var(--r);padding:clamp(1.2rem,3vw,1.6rem);transition:transform .2s,border-color .2s}
.feat-icon{font-size:clamp(22px,4vw,28px);margin-bottom:10px}
.feat-title{font-family:var(--fh);font-weight:700;font-size:clamp(13px,2vw,15px);margin-bottom:7px}
.feat-desc{font-size:13px;color:var(--tx2);line-height:1.65}
/* ── LIVE FEED ───────────────────────────────── */
.feed-item{background:var(--bg2);border:1px solid var(--b1);border-radius:9px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;animation:slideIn .3s ease both}
.feed-domain{font-family:var(--fm);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.feed-label{font-size:10px;font-family:var(--fm);letter-spacing:.08em;margin-top:2px}
.feed-score{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:800;font-size:13px;flex-shrink:0}
/* ── CTA CARD ────────────────────────────────── */
.cta-card{max-width:min(540px,100%);margin:0 auto;background:var(--surf);border:1px solid var(--b1);border-radius:20px;padding:clamp(2rem,5vw,3rem) clamp(1.5rem,4vw,2.5rem);text-align:center;position:relative;overflow:hidden}
.cta-orb{position:absolute;top:-50px;right:-50px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,136,.07) 0%,transparent 70%);pointer-events:none}
.cta-btn{display:inline-block;padding:13px clamp(20px,4vw,30px);border-radius:11px;background:linear-gradient(135deg,var(--ac),var(--gn));color:#000;font-family:var(--fh);font-weight:700;font-size:clamp(13px,2vw,15px)}
/* ── DETECTOR PAGE ───────────────────────────── */
.page-wrap{padding:calc(64px + 2rem) var(--px) 4rem;max-width:1100px;margin:0 auto}
.page-header{margin-bottom:1.8rem}
.input-wrap{display:flex;gap:8px;background:var(--surf);border:1px solid var(--b2);border-radius:13px;padding:7px 7px 7px 16px;box-shadow:0 0 40px rgba(0,212,255,.05);margin-bottom:1rem}
.url-input{flex:1;background:none;color:var(--tx);font-size:clamp(12px,2vw,14px);font-family:var(--fm);min-width:0}
.url-input::placeholder{color:var(--tx3)}
.analyze-btn{background:var(--ac);color:#000;font-family:var(--fh);font-weight:700;font-size:13px;padding:10px clamp(12px,3vw,20px);border-radius:9px;white-space:nowrap;flex-shrink:0;transition:background .2s}
.analyze-btn:disabled{background:var(--surf2);color:var(--tx3)}
.samples{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.sample-btn{font-size:11px;font-family:var(--fm);background:var(--surf);border:1px solid var(--b1);border-radius:6px;padding:5px 10px;color:var(--tx3);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s,border-color .15s}
/* ── LOADER ──────────────────────────────────── */
.loader-card{background:var(--surf);border:1px solid var(--b1);border-radius:16px;padding:clamp(1.5rem,4vw,2.5rem);animation:fadeUp .3s ease}
.loader-inner{display:flex;gap:clamp(1rem,3vw,2rem);align-items:flex-start;flex-wrap:wrap}
.spinner-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0}
.spinner{position:relative;width:64px;height:64px}
.spin-outer{position:absolute;inset:0;border-radius:50%;border:2px solid var(--b2);border-top:2px solid var(--ac);animation:spin .9s linear infinite}
.spin-inner{position:absolute;inset:8px;border-radius:50%;border:1px solid var(--b1);border-bottom:1px solid var(--gn);animation:spinR 1.4s linear infinite}
.steps-list{flex:1;min-width:180px}
.step-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px;transition:color .3s}
.step-num{width:17px;height:17px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--fm);transition:all .3s}
.progress-bar{height:3px;background:var(--b1);border-radius:2px;overflow:hidden;margin-top:1.5rem;width:100%}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--gn));border-radius:2px;transition:width .5s ease;box-shadow:0 0 10px var(--ac)}
/* ── VERDICT CARD ────────────────────────────── */
.verdict-card{background:var(--surf);border-radius:16px;padding:clamp(1.2rem,3vw,2rem);margin-bottom:var(--gap);position:relative;overflow:hidden}
.verdict-inner{display:flex;align-items:center;justify-content:space-between;gap:1.5rem;flex-wrap:wrap}
.verdict-text{flex:1;min-width:160px}
.verdict-val{font-family:var(--fh);font-weight:800;font-size:clamp(1.8rem,5vw,3rem);letter-spacing:-.03em;line-height:1.1}
.verdict-domain{font-family:var(--fm);font-size:12px;color:var(--tx2);margin-top:7px}
.verdict-badge{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:4px 11px;border-radius:5px;font-family:var(--fm);font-size:10px;letter-spacing:.08em}
.verdict-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
/* ── SCORE RING ──────────────────────────────── */
.ring-wrap{position:relative;flex-shrink:0}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--fh);font-weight:800;line-height:1}
/* ── AI INSIGHT ──────────────────────────────── */
.ai-box{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.18);border-radius:10px;padding:1rem 1.1rem;margin-top:1.2rem}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.ai-badge{width:22px;height:22px;border-radius:5px;background:linear-gradient(135deg,var(--ac),var(--gn));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#000;flex-shrink:0}
.ai-thinking{display:flex;gap:4px;align-items:center}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--ac)}
/* ── SIGNAL BARS ─────────────────────────────── */
.sig-bar{margin-bottom:1rem}
.sig-bar-head{display:flex;justify-content:space-between;margin-bottom:5px;align-items:baseline;gap:8px;flex-wrap:wrap}
.sig-bar-label{font-size:13px;font-weight:500}
.sig-bar-desc{font-size:11px;color:var(--tx3);margin-left:6px}
.sig-bar-score{font-family:var(--fm);font-size:13px;font-weight:600;flex-shrink:0}
.sig-bar-track{height:5px;background:var(--b1);border-radius:3px;overflow:hidden}
.sig-bar-fill{height:100%;border-radius:3px;transition:width 1.3s cubic-bezier(.16,1,.3,1)}
/* ── METADATA TABLE ──────────────────────────── */
.meta-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1);font-size:12px;gap:8px}
.meta-key{color:var(--tx3);flex-shrink:0}
.meta-val{font-family:var(--fm);font-size:11px;text-align:right;word-break:break-all}
/* ── SIGNAL TAGS ─────────────────────────────── */
.sig-tags{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(240px,100%),1fr));gap:8px}
.sig-tag{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:8px;font-size:13px;line-height:1.4}
.sig-icon{flex-shrink:0;margin-top:1px}
/* ── HISTORY ─────────────────────────────────── */
.hist-item{display:flex;align-items:center;justify-content:space-between;background:var(--surf);border:1px solid var(--b1);border-radius:9px;padding:9px 13px;cursor:pointer;transition:background .15s;gap:12px}
.hist-item:hover{background:var(--surf2)}
.hist-domain{font-family:var(--fm);font-size:12px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hist-right{display:flex;align-items:center;gap:9px;flex-shrink:0}
/* ── HOW IT WORKS ────────────────────────────── */
.phase-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:1.8rem}
.phase-tab{padding:7px 13px;border-radius:7px;font-size:12px;font-family:var(--fm);transition:all .2s;white-space:nowrap}
.phase-detail{background:var(--surf);border-radius:18px;padding:clamp(1.5rem,4vw,2.5rem);margin-bottom:2.5rem;animation:fadeUp .3s ease}
.phase-detail-inner{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
@media(max-width:640px){.phase-detail-inner{grid-template-columns:1fr}}
.phase-head{display:flex;align-items:center;gap:11px;margin-bottom:.8rem}
.check-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--b1);animation:slideIn .2s ease both}
.check-label{font-size:13px;font-weight:500;margin-bottom:2px}
.check-desc{font-size:11px;color:var(--tx3)}
.pipeline-scroll{display:flex;align-items:center;overflow-x:auto;gap:0;padding:.5rem 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.pipeline-scroll::-webkit-scrollbar{display:none}
.pipeline-node{flex-shrink:0;width:clamp(100px,18vw,130px);background:var(--surf);border:1px solid var(--b1);border-radius:11px;padding:.9rem;text-align:center;cursor:pointer;transition:all .2s}
.pipeline-arrow{flex-shrink:0;color:var(--tx3);font-size:14px;padding:0 4px}
.model-row{display:grid;grid-template-columns:1fr minmax(80px,120px) minmax(120px,180px);gap:1rem;padding:12px 0;border-bottom:1px solid var(--b1);align-items:center}
@media(max-width:500px){.model-row{grid-template-columns:1fr 80px;gap:.5rem}.model-type{display:none}}
/* ── DASHBOARD ───────────────────────────────── */
.dash-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.live-badge{display:flex;align-items:center;gap:7px;background:var(--surf);border:1px solid var(--b1);border-radius:9px;padding:7px 13px;font-family:var(--fm);font-size:12px;color:var(--tx2)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;flex-shrink:0}
.chart-card{background:var(--surf);border:1px solid var(--b1);border-radius:14px;padding:clamp(1rem,3vw,1.5rem)}
.legend{display:flex;gap:clamp(8px,2vw,14px);flex-wrap:wrap;margin-top:10px;font-size:11px;font-family:var(--fm);color:var(--tx3)}
.legend-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.pie-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0;font-size:11px}
.flag-table{width:100%;border-collapse:collapse;font-size:12px;min-width:400px}
.flag-th{text-align:left;padding:7px 10px;font-size:10px;color:var(--tx3);font-family:var(--fm);letter-spacing:.08em;font-weight:400;border-bottom:1px solid var(--b1)}
.flag-td{padding:11px 10px;border-bottom:1px solid var(--b1)}
.flag-badge{font-size:9px;font-family:var(--fm);letter-spacing:.08em;background:rgba(255,51,85,.1);color:var(--rd);border:1px solid rgba(255,51,85,.25);border-radius:4px;padding:3px 7px;white-space:nowrap}
/* ── ABOUT ───────────────────────────────────── */
.stat-card{background:var(--surf);border:1px solid var(--b1);border-radius:13px;padding:clamp(1.2rem,3vw,1.5rem);text-align:center}
.tech-chip{font-size:11px;font-family:var(--fm);background:var(--bg2);border:1px solid var(--b2);border-radius:5px;padding:3px 9px;color:var(--tx2)}
.tl-dot{position:absolute;left:-16px;top:5px;width:9px;height:9px;border-radius:50%}
.team-card{background:var(--surf);border:1px solid var(--b1);border-radius:13px;padding:clamp(1rem,3vw,1.3rem);text-align:center;transition:transform .2s,border-color .2s}

<script type="text/babel" data-presets="react">
/* ── ANALYZER ────────────────────────────────── */
function analyzeURL(url){
  return new Promise(resolve=>{
    setTimeout(()=>{
      const seed=url.split('').reduce((a,c)=>a+c.charCodeAt(0),0);
      const rng=(min,max,s)=>{const x=Math.sin(((s||1)*9301+seed*49297))*233280;return Math.round((x-Math.floor(x))*(max-min)+min)};
      const dom=url.replace(/https?:\/\//,'').split('/')[0].toLowerCase();
      const cred=['reuters','bbc','apnews','nytimes','theguardian','npr','wsj','washingtonpost','bloomberg','aljazeera'];
      const fake=['fakecnn','infowars','realnewstoday.biz','truenews24','totallyrealinfo','breakingnews247'];
      const bias=cred.some(d=>dom.includes(d))?28:fake.some(d=>dom.includes(d))?-32:0;
      const cl=v=>Math.min(98,Math.max(6,v));
      const ds=cl(rng(22,90,1)+bias),cs=cl(rng(18,94,2)+bias),ss=cl(rng(15,96,3)+bias),se=cl(rng(28,86,4)+bias),cr=cl(rng(18,93,5)+bias);
      const overall=Math.round(ds*.2+cs*.25+ss*.25+se*.15+cr*.15);
      let verdict,label,color;
      if(overall>=75){verdict='Likely Real';label='CREDIBLE';color='#00ff88';}
      else if(overall>=55){verdict='Unverified';label='UNCERTAIN';color='#ffcc00';}
      else if(overall>=35){verdict='Suspicious';label='SUSPICIOUS';color='#ff8844';}
      else{verdict='Likely Fake';label='FAKE';color='#ff3355';}
      const pos=['Domain registered over 5 years ago','HTTPS enabled with valid SSL certificate','Author byline present and verifiable','Cross-referenced with Reuters, AP, BBC','Neutral, fact-based language detected','Multiple credible external sources cited'];
      const warn=['Slightly sensational headline tone','Limited cross-source verification found','Publication date not clearly visible','Few external citations in article body'];
      const neg=['Domain registered less than 6 months ago','High emotional manipulation detected','No verified author information found','Story not corroborated by any major outlet','Clickbait patterns detected in headline','Domain flagged on misinformation blacklist'];
      let signals=[];
      if(overall>=70)signals=[...pos.slice(0,rng(3,5,20)).map(t=>({type:'positive',text:t})),...warn.slice(0,rng(0,2,21)).map(t=>({type:'warning',text:t}))];
      else if(overall>=45)signals=[...pos.slice(0,rng(1,3,20)).map(t=>({type:'positive',text:t})),...warn.slice(0,rng(1,3,21)).map(t=>({type:'warning',text:t})),...neg.slice(0,rng(1,2,22)).map(t=>({type:'negative',text:t}))];
      else signals=[...warn.slice(0,rng(1,2,21)).map(t=>({type:'warning',text:t})),...neg.slice(0,rng(3,5,22)).map(t=>({type:'negative',text:t}))];
      resolve({url,domain:dom,overall,verdict,label,color,timestamp:new Date().toISOString(),
        scores:{domain:{score:ds,label:'Domain Credibility',desc:'Age, registration, blacklist'},content:{score:cs,label:'Content Analysis',desc:'NLP, sentiment, bias'},source:{score:ss,label:'Source Reputation',desc:'Publisher trust index'},sentiment:{score:se,label:'Sentiment Score',desc:'Emotional manipulation'},crossRef:{score:cr,label:'Cross-Reference',desc:'Verified vs 12 databases'}},
        signals,
        metadata:{'Domain Age':`${rng(1,20,10)} years`,'HTTPS':rng(0,10,11)>3?'✓ Enabled':'✗ Missing','Country':['US','GB','IN','AU','DE'][rng(0,4,12)],'Alexa Rank':'#'+rng(200,5000000,13).toLocaleString(),'Word Count':rng(200,3200,14).toLocaleString(),'Reading Level':['Elementary','Middle School','High School','College'][rng(0,3,15)]}
      });
    },2700);
  });
}

/* ── HOOKS ───────────────────────────────────── */
const {useState,useEffect,useRef}=React;

function useWindowWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h)},[]);
  return w;
}

/* ── SCORE RING ──────────────────────────────── */
function ScoreRing({score,size,color}){
  const sz=size||clampSize();
  function clampSize(){const w=window.innerWidth;return w<400?90:w<600?100:120}
  const [cur,setCur]=useState(0);
  const r=sz/2-8,circ=2*Math.PI*r,offset=circ-(cur/100)*circ;
  useEffect(()=>{const t=setTimeout(()=>setCur(score),200);return()=>clearTimeout(t)},[score]);
  return(
    <div className="ring-wrap" style={{width:sz,height:sz}}>
      <svg width={sz} height={sz} style={{transform:'rotate(-90deg)',position:'absolute',inset:0}}>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--b2)" strokeWidth={7}/>
        <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke={color} strokeWidth={7} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:'stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1)',filter:`drop-shadow(0 0 8px ${color}66)`}}/>
      </svg>
      <div className="ring-label">
        <div className="ring-num" style={{fontSize:sz<100?22:28,color}}>{cur}</div>
        <div style={{fontSize:9,color:'var(--tx3)',fontFamily:'var(--fm)',marginTop:2}}>/100</div>
      </div>
    </div>
  );
}

/* ── SIGNAL BAR ──────────────────────────────── */
function SignalBar({label,desc,score}){
  const [w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(score),130);return()=>clearTimeout(t)},[score]);
  const c=score>=70?'#00ff88':score>=45?'#ffcc00':'#ff3355';
  return(
    <div className="sig-bar">
      <div className="sig-bar-head">
        <div><span className="sig-bar-label">{label}</span><span className="sig-bar-desc hide-sm">{desc}</span></div>
        <span className="sig-bar-score" style={{color:c}}>{score}</span>
      </div>
      <div className="sig-bar-track">
        <div className="sig-bar-fill" style={{width:w+'%',background:`linear-gradient(90deg,${c}88,${c})`,boxShadow:`0 0 8px ${c}44`}}/>
      </div>
    </div>
  );
}

/* ── SIGNAL TAG ──────────────────────────────── */
function SigTag({type,text}){
  const s={positive:{bg:'rgba(0,255,136,.07)',border:'rgba(0,255,136,.2)',color:'#00ff88',icon:'✓'},warning:{bg:'rgba(255,204,0,.07)',border:'rgba(255,204,0,.2)',color:'#ffcc00',icon:'⚠'},negative:{bg:'rgba(255,51,85,.07)',border:'rgba(255,51,85,.2)',color:'#ff3355',icon:'✗'}}[type]||{};
  return <div className="sig-tag" style={{background:s.bg,border:`1px solid ${s.border}`}}><span className="sig-icon" style={{color:s.color}}>{s.icon}</span><span style={{color:s.color}}>{text}</span></div>;
}

/* ── AI INSIGHT ──────────────────────────────── */
function AiInsight({result}){
  const [text,setText]=useState('');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    setText('');setLoading(true);
    const prompt=`You are a misinformation detection expert. In 2-3 sentences, explain why this article scored ${result.overall}/100 (verdict: ${result.verdict}) for domain "${result.domain}". Signals: ${result.signals.map(s=>s.text).join('; ')}. Be specific. No bullet points.`;
    fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,stream:true,messages:[{role:'user',content:prompt}]})})
    .then(async res=>{
      if(!res.ok)throw new Error();
      const reader=res.body.getReader(),dec=new TextDecoder();
      setLoading(false);
      while(true){
        const{done,value}=await reader.read();if(done)break;
        const lines=dec.decode(value).split('\n').filter(l=>l.startsWith('data: '));
        for(const line of lines){try{const j=JSON.parse(line.slice(6));if(j.type==='content_block_delta'&&j.delta?.text)setText(t=>t+j.delta.text);}catch{}}
      }
    }).catch(()=>{
      setLoading(false);
      setText(result.overall>=70?`This article from ${result.domain} shows strong credibility signals including established domain history, neutral factual language, and multi-source corroboration. The ${result.overall}/100 score reflects verifiable authorship and low emotional manipulation.`:result.overall>=45?`${result.domain} returns a mixed verdict at ${result.overall}/100. Some credibility markers exist but cross-source verification is limited and elevated emotional framing was detected. Verify claims independently.`:`${result.domain} triggered multiple red flags: suspicious domain registration, high emotional manipulation, and zero corroboration across 12 databases. Consistent with known misinformation source patterns.`);
    });
  },[result.url]);
  return(
    <div className="ai-box">
      <div className="ai-header">
        <div className="ai-badge">AI</div>
        <span style={{fontSize:11,fontFamily:'var(--fm)',color:'var(--ac)',letterSpacing:'.08em'}}>AI EXPERT ANALYSIS</span>
        {loading&&<span style={{fontSize:11,color:'var(--tx3)',marginLeft:'auto'}}>Thinking...</span>}
      </div>
      {loading?<div className="ai-thinking">{[0,1,2].map(i=><div key={i} className="ai-dot" style={{animation:`pulse 1s infinite ${i*.15}s`}}/>)}</div>
        :<p style={{fontSize:13,color:'var(--tx2)',lineHeight:1.75,margin:0}}>{text}</p>}
    </div>
  );
}

/* ── DETECTOR PAGE ───────────────────────────── */
const STEPS=[{label:'Fetching article content',icon:'🔗'},{label:'Analyzing domain reputation',icon:'🌐'},{label:'Running NLP pipeline',icon:'🧠'},{label:'Cross-referencing sources',icon:'🔍'},{label:'Calculating credibility score',icon:'📊'},{label:'Generating AI verdict',icon:'⚖️'}];
const SAMPLES=['https://reuters.com/world/economy/latest','https://fakecnn-news.info/shocking-truth','https://bbc.co.uk/news/science-55001','https://realnewstoday.biz/bombshell'];

function Detector({initUrl,setInitUrl}){
  const [url,setUrl]=useState(initUrl||'');
  const [loading,setLoading]=useState(false);
  const [step,setStep]=useState(0);
  const [result,setResult]=useState(null);
  const [err,setErr]=useState('');
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('tl_h')||'[]')}catch{return[]}});
  const timerRef=useRef(null);
  const w=useWindowWidth();
  const isMobile=w<600;

  useEffect(()=>{if(initUrl){const u=initUrl;setUrl(u);setInitUrl('');go(u)}},[]);

  function go(u){
    const target=(u||url).trim();
    if(!target){setErr('Please enter a URL');return;}
    if(!target.startsWith('http')){setErr('URL must start with http:// or https://');return;}
    setErr('');setLoading(true);setResult(null);setStep(0);
    let s=0;timerRef.current=setInterval(()=>{s++;if(s<STEPS.length)setStep(s);else clearInterval(timerRef.current)},440);
    analyzeURL(target).then(res=>{
      clearInterval(timerRef.current);setStep(STEPS.length);
      setTimeout(()=>{setLoading(false);setResult(res);const h=[res,...history.filter(x=>x.url!==res.url)].slice(0,8);setHistory(h);try{localStorage.setItem('tl_h',JSON.stringify(h))}catch{}},300);
    });
  }

  return(
    <div className="page-wrap" style={{maxWidth:940}}>
      <div className="page-header">
        <div className="label" style={{marginBottom:5}}>DETECTOR</div>
        <h1 className="h2">Analyze Any News URL</h1>
        <p style={{color:'var(--tx3)',fontSize:13,marginTop:6}}>Paste a news article link. Results in ~3 seconds.</p>
      </div>

      <div className="input-wrap" style={{marginBottom:err?8:'1.3rem'}}>
        <input className="url-input" value={url} onChange={e=>{setUrl(e.target.value);setErr('')}} onKeyDown={e=>e.key==='Enter'&&go()} placeholder="https://example.com/news/article..." autoFocus/>
        <button className="analyze-btn" onClick={()=>go()} disabled={loading}>{loading?'Analyzing...':'Analyze →'}</button>
      </div>
      {err&&<p style={{color:'var(--rd)',fontSize:13,marginBottom:'1rem',fontFamily:'var(--fm)'}}>⚠ {err}</p>}

      {!result&&!loading&&(
        <div style={{marginBottom:'1.5rem'}}>
          <div className="label" style={{marginBottom:7}}>TRY A SAMPLE</div>
          <div className="samples">
            {SAMPLES.map((s,i)=><button key={i} className="sample-btn" onClick={()=>{setUrl(s);go(s)}}>{s.replace('https://','')}</button>)}
          </div>
        </div>
      )}

      {loading&&(
        <div className="loader-card">
          <div className="loader-inner">
            <div className="spinner-wrap">
              <div className="spinner">
                <div className="spin-outer"/><div className="spin-inner"/>
                <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19}}>{STEPS[Math.min(step,STEPS.length-1)].icon}</div>
              </div>
              <div style={{fontSize:12,color:'var(--tx3)',fontFamily:'var(--fm)'}}>{Math.round((step/STEPS.length)*100)}%</div>
            </div>
            <div className="steps-list">
              <div className="h3" style={{marginBottom:'1rem',fontSize:14}}>Running 6-phase analysis...</div>
              {STEPS.map((s,i)=>(
                <div key={i} className="step-row" style={{color:i<step?'#00ff88':i===step?'var(--tx)':'var(--tx3)'}}>
                  <span className="step-num" style={{background:i<step?'rgba(0,255,136,.14)':i===step?'rgba(0,212,255,.14)':'var(--surf2)',color:i<step?'#00ff88':i===step?'var(--ac)':'var(--tx3)'}}>{i<step?'✓':i+1}</span>
                  {s.label}
                </div>
              ))}
            </div>
          </div>
          <div className="progress-bar"><div className="progress-fill" style={{width:`${(step/STEPS.length)*100}%`}}/></div>
        </div>
      )}

      {result&&!loading&&(
        <div style={{animation:'fadeUp .5s ease'}}>
          {/* Verdict hero */}
          <div className="verdict-card" style={{border:`1px solid ${result.color}44`,backgroundImage:`radial-gradient(ellipse 60% 40% at 50% 0%,${result.color}0d 0%,transparent 70%)`}}>
            <div style={{position:'absolute',top:-80,right:-80,width:260,height:260,borderRadius:'50%',background:`radial-gradient(circle,${result.color}0e 0%,transparent 70%)`,pointerEvents:'none'}}/>
            <div className="verdict-inner">
              <div className="verdict-text">
                <div className="label">VERDICT</div>
                <div className="verdict-val" style={{color:result.color,textShadow:`0 0 40px ${result.color}44`}}>{result.verdict}</div>
                <div className="verdict-domain">{result.domain}</div>
                <div className="verdict-badge" style={{background:result.color+'18',border:`1px solid ${result.color}44`,color:result.color}}>

            <div className="card">

              <button onClick={()=>{setResult(null);setUrl('')}} style={{marginTop:'1rem',width:'100%',padding:'8px',borderRadius:7,fontSize:13,fontFamily:'var(--fh)',fontWeight:600,color:'var(--tx2)',background:'var(--surf2)',border:'1px solid var(--b1)'}}>← Analyze another URL</button>

          </div>

          {/* Detection signals */}
          <div className="card">
            <div className="h3" style={{marginBottom:'1rem'}}>Detection Signals</div>
            <div className="sig-tags">{result.signals.map((s,i)=><SigTag key={i} type={s.type} text={s.text}/>)}</div>
          </div>
        </div>
      )}

      {history.length>0&&!loading&&!result&&(
        <div style={{marginTop:'2rem'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.7rem'}}>

            {history.slice(0,5).map((h,i)=>(
              <div key={i} className="hist-item" style={{borderLeft:`3px solid ${h.color}`}} onClick={()=>{setUrl(h.url);setResult(h)}}>

              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

        <div className="cta-orb"/>
        <h2 className="h2" style={{fontSize:'clamp(1.4rem,4vw,1.9rem)',marginBottom:'.8rem'}}>Ready to detect fake news?</h2>
        <p style={{color:'var(--tx2)',marginBottom:'1.8rem',fontSize:14}}>Free, instant, no account required. Just paste a URL.</p>
        <button className="cta-btn" onClick={()=>setPage('detect')}>Start Detecting →</button>
      </div>
    </div>
  );
}

/* ── ROOT APP ────────────────────────────────── */
function App(){
  const [page,setPage]=useState('home');
  const [initUrl,setInitUrl]=useState('');
  // Scroll to top on page change
  useEffect(()=>window.scrollTo(0,0),[page]);

  const pages={
    home:<Home setPage={setPage} setInitUrl={setInitUrl}/>,
    detect:<Detector initUrl={initUrl} setInitUrl={setInitUrl}/>,
    how:<HowItWorks/>,
    dashboard:<Dashboard/>,
    about:<About setPage={setPage}/>,
  };
  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Navbar page={page} setPage={setPage}/>
      <main style={{flex:1}}>{pages[page]||pages.home}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
